<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syndicate.AI</title>
    <!-- Official Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            color: #0f0; 
            font-family: monospace; 
            overflow: hidden; 
            user-select: none; /* Prevents text highlighting when tapping */
            -webkit-user-select: none;
        }
        /* Background Layer - Cyberpunk Server Room */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%%" style="stop-color:%23001100;stop-opacity:1" /><stop offset="50%%" style="stop-color:%23000000;stop-opacity:1" /><stop offset="100%%" style="stop-color:%23000000;stop-opacity:1" /></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="1600" fill="url(%23grad1)"/><rect x="50" y="100" width="150" height="1400" fill="%23001a00" opacity="0.3" filter="url(%23glow)"/><rect x="1000" y="100" width="150" height="1400" fill="%23001a00" opacity="0.3" filter="url(%23glow)"/><circle cx="600" cy="800" r="80" fill="%230f0" opacity="0.15" filter="url(%23glow)"/></svg>');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            backdrop-filter: blur(1px);
        }
        
        /* Dark overlay for text readability */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(0.5px);
        }
        
        .header { 
            padding: 20px; 
            text-align: center; 
            font-size: 22px; 
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; 
            color: #0f0;
            letter-spacing: 2px;
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
            50% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 30px #00ff00; }
        }
        
        .stats { 
            display: flex; 
            justify-content: space-between; 
            padding: 0 30px; 
            font-size: 18px; 
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            color: #0f0;
            letter-spacing: 1px;
        }
        
        /* The Tap Target */
        .core-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 55vh; 
        }
        
        .core-target { 
            width: 220px; 
            height: 220px; 
            background: radial-gradient(circle, #0f0 5%, #002200 70%); 
            border-radius: 50%; 
            box-shadow: 0 0 40px #0f0, inset 0 0 20px rgba(0, 255, 0, 0.3); 
            transition: transform 0.05s ease-out, box-shadow 0.1s ease-out; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #0f0;
            cursor: pointer;
            letter-spacing: 2px;
        }
        
        .core-target:active { 
            transform: scale(0.93); 
            box-shadow: 0 0 80px #0f0, inset 0 0 30px rgba(0, 255, 0, 0.5); 
        }
        
        .core-target:hover {
            box-shadow: 0 0 60px #0f0, inset 0 0 25px rgba(0, 255, 0, 0.4);
        }
        
        /* Bottom Navigation */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(5, 5, 5, 0.8)); 
            padding: 20px 0; 
            border-top: 2px solid #0f0; 
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -5px 20px rgba(0, 255, 0, 0.2);
        }
        
        .nav-btn { 
            color: #0f0; 
            background: none; 
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 8px 16px;
            font-family: monospace; 
            font-size: 14px;
            cursor: pointer;
            text-shadow: 0 0 5px #0f0;
            transition: all 0.2s ease-out;
            letter-spacing: 1px;
        }
        
        .nav-btn:active,
        .nav-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px #0f0, inset 0 0 10px rgba(0, 255, 0, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="overlay"></div>
    <div class="header" id="username">AGENT_INIT</div>
    
    <div class="stats">
        <div>DATA: <span id="score">0</span></div>
        <div>ENG: <span id="energy">1000</span></div>
    </div>

    <div class="core-container">
        <!-- Tap area -->
        <div class="core-target" id="tapTarget">HACK</div>
    </div>

    <div class="nav">
        <button class="nav-btn">HACK</button>
        <button class="nav-btn">UPGRADES</button>
        <button class="nav-btn">TASKS</button>
        <button class="nav-btn">FRIENDS</button>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Forces the app to open full-screen
        tg.ready();

        // Game State Variables
        let score = 0;
        let energy = 1000;

        // Pull username from Telegram API
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = "AGENT_" + tg.initDataUnsafe.user.first_name.toUpperCase();
        }

        const tapTarget = document.getElementById('tapTarget');
        const scoreDisplay = document.getElementById('score');
        const energyDisplay = document.getElementById('energy');

        // Tap Logic with multi-touch support
        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents double-tap zooming on mobile
            
            // Loop through each finger touching the screen
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (energy > 0) {
                    score += 1;
                    energy -= 1;
                    scoreDisplay.innerText = score;
                    energyDisplay.innerText = energy;
                    
                    // Trigger native iPhone vibration
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
